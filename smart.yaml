  - name: 智能选择
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Auto.png
    include-all: true
    exclude-type: direct
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 香港自动
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(港|hk|hong\s*kong)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 新加坡自动
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(新|sg|singapore)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 日本自动
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(日|jp|japan)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 韩国自动
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Korea.png
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(韩|kr|korea|seoul|首尔)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 美国自动
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(美|us|usa|united\s*states)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 台湾自动
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Taiwan.png
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(台|tw|taiwan)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 欧洲自动
    type: url-test
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Global.png
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(uk|gb|de|fr|nl|eu|london|germany|france|netherlands|europe|英国|德国)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 亚洲其他自动
    type: url-test
    icon: https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/svgs/solid/earth-asia.svg
    include-all: true
    exclude-type: direct
    filter: '(?i)(^|[\s._-])(my|th|vn|id|ph|in|malaysia|thailand|vietnam|indonesia|philippines|india|马来|泰国|越南|印尼|菲律宾|印度)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 其他自动
    type: url-test
    icon: https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/svgs/solid/shuffle.svg
    include-all: true
    exclude-type: direct
    exclude-filter: '(?i)(^|[\s._-])(港|hk|hong\s*kong|新|sg|singapore|日|jp|japan|韩|kr|korea|seoul|首尔|美|us|usa|united\s*states|台|tw|taiwan|uk|gb|de|fr|nl|eu|london|germany|france|netherlands|europe|英国|德国|my|th|vn|id|ph|in|malaysia|thailand|vietnam|indonesia|philippines|india|马来|泰国|越南|印尼|菲律宾|印度)([\s._-]|$)'
    url: https://www.gstatic.com/generate_204
    interval: 300

